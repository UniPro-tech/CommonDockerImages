name: Autometically Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install dependencies
        run: |
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          fi

      # スクリプト内で docker push まで行うため、先にログインを済ませておく
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check updates, Build and Push
        id: check
        run: python scripts/check_updates.py

      - name: Commit and Push changes via GitHub API
        if: steps.check.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # 変更されたファイルの内容をBase64エンコード
          DOCKERFILE_BASE64=$(base64 -w 0 official/postgres/Dockerfile)
          STATE_BASE64=$(base64 -w 0 state/postgres.json)

          # GraphQLのcreateCommitOnBranchを使ってAPI経由で一括コミット＆プッシュ
          gh api graphql \
            -F repositoryWithOwner="${{ github.repository }}" \
            -F branchName="${{ github.ref_name }}" \
            -F expectedHeadOid="$(git rev-parse HEAD)" \
            -F dockerfileContent="$DOCKERFILE_BASE64" \
            -F stateContent="$STATE_BASE64" \
            -f query='
              mutation($repositoryWithOwner: String!, $branchName: String!, $expectedHeadOid: GitObjectID!, $dockerfileContent: Base64String!, $stateContent: Base64String!) {
                createCommitOnBranch(input: {
                  branch: {
                    repositoryNameWithOwner: $repositoryWithOwner,
                    branchName: $branchName
                  },
                  expectedHeadOid: $expectedHeadOid,
                  message: { headline: "chore: auto-update postgres and pg_bigm [skip ci]" },
                  fileChanges: {
                    additions: [
                      { path: "official/postgres/Dockerfile", contents: $dockerfileContent },
                      { path: "state/postgres.json", contents: $stateContent }
                    ]
                  }
                }) {
                  commit { url }
                }
              }
            '
